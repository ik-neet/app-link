<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>My Apps</title>

  <!-- Google Font -->
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">

  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      background: #0f172a;
      color: #e5e7eb;
    }

    header {
      text-align: center;
      padding: 60px 20px 30px;
    }

    header h1 {
      font-size: 32px;
      margin: 0;
      font-weight: 600;
    }

    header p {
      margin-top: 10px;
      color: #94a3b8;
      font-size: 14px;
    }

    .container {
      max-width: 900px;
      margin: 0 auto;
      padding: 20px;
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
      gap: 16px;
    }

    .card {
      background: rgba(255, 255, 255, 0.05);
      backdrop-filter: blur(10px);
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 16px;
      padding: 20px;
      transition: all 0.25s ease;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
    }

    .card:hover {
      transform: translateY(-5px);
      border-color: rgba(255, 255, 255, 0.2);
    }

    .card h2 {
      font-size: 18px;
      margin: 0 0 16px;
      font-weight: 600;
    }

    .card a {
      text-decoration: none;
      font-size: 14px;
      color: #0f172a;
      background: #38bdf8;
      padding: 10px 14px;
      border-radius: 8px;
      text-align: center;
      font-weight: 600;
      transition: all 0.2s ease;
    }

    .card a:hover {
      background: #0ea5e9;
    }

    footer {
      text-align: center;
      padding: 40px 20px;
      font-size: 12px;
      color: #64748b;
    }
</head>
<body>

<header>
  <h1>アプリリンク集</h1>
  <p>作成したWebアプリ一覧</p>
</header>

<div class="container">

  <div class="card">
    <h2>Wikipediaカードバトル</h2>
    <a href="https://wikipedia-card-battle.vercel.app/" target="_blank">
      アプリを開く
    </a>
  </div>

  <div class="card">
    <h2>トークテーマガチャ</h2>
    <a href="https://talks-theme-gacha.web.app/" target="_blank">
      アプリを開く
    </a>
  </div>

  <div class="card">
    <h2>ルーレット</h2>
    <a href="https://roulette-2b82a.web.app/" target="_blank">
      アプリを開く
    </a>
  </div>

  <div class="card">
    <h2>クイズバトル</h2>
    <a href="https://quiz-battle-9a6fa.web.app/" target="_blank">
      アプリを開く
    </a>
  </div>
  
  <div class="card">
    <h2>割り勘管理</h2>
    <a href="https://warikan-874e6.web.app/" target="_blank">
      アプリを開く
    </a>
  </div>

  
</div>

<footer>
  © 2026 ik_neet
</footer>

</body>
</html>
